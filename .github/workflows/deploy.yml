name: Deploy to EKS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_REPO: ${{ secrets.ECR_REPO }}

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v3

      # 2. Configure AWS
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 3. Login to ECR
      - name: Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION \
          | docker login --username AWS --password-stdin $ECR_REPO

      # 4. Build Docker Image (IMPORTANT FIX)
      - name: Build Docker
        run: docker build -t app ./BasicWebApp

      # 5. Push Image
      - name: Push Image
        run: |
          docker tag app:latest $ECR_REPO:latest
          docker push $ECR_REPO:latest

      # 6. Connect to EKS
      - name: Connect to EKS
        run: aws eks update-kubeconfig --name testing_cluster --region $AWS_REGION

      # 7. Deploy to Kubernetes
      - name: Deploy
        run: |
          sed -i "s|IMAGE_PLACEHOLDER|$ECR_REPO:latest|g" BasicWebApp/k8s/deployment.yaml
          kubectl apply -f BasicWebApp/k8s/deployment.yaml
          kubectl apply -f BasicWebApp/k8s/service.yaml